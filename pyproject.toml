[project]
name = "percival-cargo"
version = "0.1.0"
description = ""
authors = [
    {name = "Sergei Mikurov",email = "454004@mail.ru"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
]

[tool.poetry]
packages = [{include = "percival_cargo", from = "src"}]

[[tool.poetry.source]]
